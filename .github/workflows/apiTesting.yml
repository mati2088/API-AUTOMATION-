name: API Testing #nombre pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_id:
        description: 'Run ID from TestOne'
        required: false
      tags:
        description: 'Test tags to filter'
        required: false

jobs:
  test: #nombre del job
    runs-on: ubuntu-latest #sistema operativo
    env:
      BASE_URL: ${{ secrets.BASE_URL }}
    steps:
      - uses: actions/checkout@v4 #checkout del repositorio
      - uses: actions/setup-node@v4 #configuracion de node
        with:
          node-version: '20' #version de node
      - run: npm ci #instalacion de dependencias
      - run: npx playwright install --with-deps #instalacion de dependencias de playwright
      - run: npx playwright test #ejecucion de pruebas
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 1
